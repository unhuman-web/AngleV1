name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.11.1

      - name: Decode keystore
        if: github.event.inputs.build_type == 'release'
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release-key.jks

      - name: Create keystore properties
        if: github.event.inputs.build_type == 'release'
        run: |
          cat > keystore.properties << EOF
          storeFile=release-key.jks
          storePassword=${{ secrets.KEYSTORE_PASSWORD }}
          keyAlias=${{ secrets.KEY_ALIAS }}
          keyPassword=${{ secrets.KEY_PASSWORD }}
          EOF

      - name: Build Debug APK
        if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        if: github.event.inputs.build_type == 'release'
        run: ./gradlew assembleRelease --stacktrace

      - name: Upload Debug APK
        if: github.event_name == 'push' || github.event.inputs.build_type == 'debug'
        uses: actions/upload-artifact@v4
        with:
          name: storage-cleanup-debug
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30

      - name: Upload Release APK
        if: github.event.inputs.build_type == 'release'
        uses: actions/upload-artifact@v4
        with:
          name: storage-cleanup-release
          path: app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Clean up keystore
        if: always()
        run: |
          rm -f app/release-key.jks
          rm -f keystore.properties
